server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression (biggest transfer win) ---
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        application/wasm;

    # --- Immutable caching for content-hashed build assets ---
    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:svg|png|jpg|jpeg|gif|ico|webp)$ {
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # index.html must never be cached so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
